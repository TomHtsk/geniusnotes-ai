<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sign in â€” geniusnotes ai</title>
  <style>
    :root {
      --bg: #06060F; --surface: #12121E; --border: rgba(255,255,255,0.07);
      --text: #F0F0FF; --muted: #8888AA; --purple: #8B5CF6; --purple2: #A78BFA; --cyan: #4FC3F7;
    }
    :root.light {
      --bg: #F4F4FC; --surface: #fff; --border: rgba(0,0,0,0.08);
      --text: #0A0A1A; --muted: #666677;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; transition: background 0.2s, color 0.2s; }

    nav { display: flex; align-items: center; justify-content: space-between; padding: 0 40px; height: 60px; border-bottom: 1px solid var(--border); background: rgba(6,6,15,0.92); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; }
    :root.light nav { background: rgba(244,244,252,0.92); }
    .nav-logo { display: flex; align-items: center; gap: 8px; font-size: 1rem; font-weight: 800; color: var(--text); text-decoration: none; white-space: nowrap; }
    .nav-logo .ai { color: var(--purple2); }
    .nav-link { color: var(--muted); text-decoration: none; font-size: 0.875rem; font-weight: 500; }
    .nav-link:hover { color: var(--text); }

    .auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; }
    .auth-card h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
    .auth-card .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }

    .google-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--text); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.15s; margin-bottom: 20px; }
    .google-btn:hover { background: rgba(255,255,255,0.05); }
    :root.light .google-btn:hover { background: rgba(0,0,0,0.04); }
    .google-icon { width: 18px; height: 18px; }

    .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .divider span { color: var(--muted); font-size: 0.8rem; white-space: nowrap; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
    .field input { width: 100%; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.9rem; outline: none; transition: border-color 0.15s; }
    :root.light .field input { background: #F4F4FC; }
    .field input:focus { border-color: var(--purple); }
    .field input.error { border-color: #EF4444; }

    .field-row { position: relative; }
    .field-row input { padding-right: 44px; }
    .toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; display: flex; align-items: center; outline: none; }
    .toggle-pw:hover { color: var(--text); }

    .forgot { display: block; text-align: right; font-size: 0.8rem; color: var(--purple2); text-decoration: none; margin-bottom: 20px; }
    .forgot:hover { text-decoration: underline; }

    .submit-btn { width: 100%; padding: 13px; border-radius: 10px; border: none; background: var(--purple); color: #fff; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
    .submit-btn:hover { opacity: 0.88; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #EF4444; font-size: 0.82rem; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; display: none; }
    .error-msg.show { display: block; }

    .switch { text-align: center; margin-top: 24px; font-size: 0.85rem; color: var(--muted); }
    .switch a { color: var(--purple2); text-decoration: none; font-weight: 600; }
    .switch a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">âœ¦ GeniusNotes <span class="ai">AI</span></a>
  <a href="signup.html" class="nav-link">Create account â†’</a>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your GeniusNotes account</p>

    <button class="google-btn" id="googleBtn">
      <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="divider"><span>or sign in with email</span></div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>

    <div class="field">
      <label>Password</label>
      <div class="field-row">
        <input type="password" id="password" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" autocomplete="current-password" />
        <button class="toggle-pw" id="togglePw" type="button"><svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
      </div>
    </div>

    <a href="reset.html" class="forgot">Forgot password?</a>

    <button class="submit-btn" id="submitBtn">Sign in</button>

    <div class="switch">Don't have an account? <a href="signup.html">Sign up free</a></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyAwbZkiZR8NRgrFYCL041FHfGquHyeEJUI",
    authDomain: "geniusnotes-ai.firebaseapp.com",
    projectId: "geniusnotes-ai",
    storageBucket: "geniusnotes-ai.firebasestorage.app",
    messagingSenderId: "1041746856723",
    appId: "1:1041746856723:web:fae9072e0292c3946068e6",
    measurementId: "G-6MEN0RBSEF"
  });
  const auth = firebase.auth();
  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

  // Redirect if already signed in
  auth.onAuthStateChanged(user => { if (user) window.location.href = 'index.html'; });

  // Theme
  if (localStorage.getItem('theme') === 'light') document.documentElement.classList.add('light');

  const emailEl   = document.getElementById('email');
  const passEl    = document.getElementById('password');
  const errorMsg  = document.getElementById('errorMsg');
  const submitBtn = document.getElementById('submitBtn');

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
  }
  function clearError() { errorMsg.classList.remove('show'); }

  const EYE_OPEN = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  const EYE_CLOSED = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
  const toggleBtn = document.getElementById('togglePw');
  toggleBtn.addEventListener('click', () => {
    const show = passEl.type === 'password';
    passEl.type = show ? 'text' : 'password';
    toggleBtn.innerHTML = show ? EYE_CLOSED : EYE_OPEN;
    toggleBtn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
  });

  // Email/password sign in
  submitBtn.addEventListener('click', async () => {
    clearError();
    const email = emailEl.value.trim();
    const pass  = passEl.value;
    if (!email || !pass) return showError('Please fill in all fields.');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing inâ€¦';
    try {
      await auth.signInWithEmailAndPassword(email, pass);
      window.location.href = 'index.html';
    } catch (e) {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign in';
      const msgs = {
        'auth/user-not-found': 'No account found with that email.',
        'auth/wrong-password': 'Incorrect password.',
        'auth/invalid-email': 'Please enter a valid email.',
        'auth/too-many-requests': 'Too many attempts. Try again later.',
        'auth/invalid-credential': 'Incorrect email or password.'
      };
      showError(msgs[e.code] || e.message);
    }
  });

  // Google sign in
  document.getElementById('googleBtn').addEventListener('click', async () => {
    clearError();
    try {
      await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
      window.location.href = 'index.html';
    } catch (e) {
      if (e.code !== 'auth/popup-closed-by-user') showError(e.message);
    }
  });

  // Enter key submits
  [emailEl, passEl].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') submitBtn.click(); }));
</script>
</body>
</html>
