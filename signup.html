<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sign up — geniusnotes ai</title>
  <style>
    :root {
      --bg: #06060F; --surface: #12121E; --border: rgba(255,255,255,0.07);
      --text: #F0F0FF; --muted: #8888AA; --purple: #8B5CF6; --purple2: #A78BFA; --cyan: #4FC3F7;
    }
    :root.light {
      --bg: #F4F4FC; --surface: #fff; --border: rgba(0,0,0,0.08);
      --text: #0A0A1A; --muted: #666677;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; transition: background 0.2s, color 0.2s; }

    nav { display: flex; align-items: center; justify-content: space-between; padding: 0 40px; height: 60px; border-bottom: 1px solid var(--border); background: rgba(6,6,15,0.92); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; }
    :root.light nav { background: rgba(244,244,252,0.92); }
    .nav-logo { display: flex; align-items: center; gap: 8px; font-size: 1rem; font-weight: 800; color: var(--text); text-decoration: none; }
    .nav-logo .ai { color: var(--purple2); }
    .nav-link { color: var(--muted); text-decoration: none; font-size: 0.875rem; font-weight: 500; }
    .nav-link:hover { color: var(--text); }

    .auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; }
    .auth-card h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
    .auth-card .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }

    .google-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--text); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.15s; margin-bottom: 20px; }
    .google-btn:hover { background: rgba(255,255,255,0.05); }
    :root.light .google-btn:hover { background: rgba(0,0,0,0.04); }
    .google-icon { width: 18px; height: 18px; }

    .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .divider span { color: var(--muted); font-size: 0.8rem; white-space: nowrap; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
    .field input { width: 100%; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.9rem; outline: none; transition: border-color 0.15s; }
    :root.light .field input { background: #F4F4FC; }
    .field input:focus { border-color: var(--purple); }

    .field-row { position: relative; }
    .field-row input { padding-right: 44px; }
    .toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 4px; }

    .strength { height: 4px; border-radius: 2px; margin-top: 6px; background: var(--border); overflow: hidden; }
    .strength-bar { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; width: 0; }

    .submit-btn { width: 100%; padding: 13px; border-radius: 10px; border: none; background: var(--purple); color: #fff; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: opacity 0.15s; margin-top: 4px; }
    .submit-btn:hover { opacity: 0.88; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #EF4444; font-size: 0.82rem; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; display: none; }
    .error-msg.show { display: block; }

    .terms { font-size: 0.78rem; color: var(--muted); text-align: center; margin-top: 16px; line-height: 1.5; }

    .switch { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--muted); }
    .switch a { color: var(--purple2); text-decoration: none; font-weight: 600; }
    .switch a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">✦ GeniusNotes <span class="ai">AI</span></a>
  <a href="signin.html" class="nav-link">Already have an account? Sign in</a>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <h1>Create your account</h1>
    <p class="subtitle">Start studying smarter — it's free</p>

    <button class="google-btn" id="googleBtn">
      <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="divider"><span>or sign up with email</span></div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="field">
      <label>Full name</label>
      <input type="text" id="name" placeholder="Alex Johnson" autocomplete="name" />
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>

    <div class="field">
      <label>Password</label>
      <div class="field-row">
        <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" />
        <button class="toggle-pw" id="togglePw" type="button">👁</button>
      </div>
      <div class="strength"><div class="strength-bar" id="strengthBar"></div></div>
    </div>

    <button class="submit-btn" id="submitBtn">Create account</button>

    <p class="terms">By signing up you agree to our Terms of Service and Privacy Policy.</p>

    <div class="switch">Already have an account? <a href="signin.html">Sign in</a></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyAwbZkiZR8NRgrFYCL041FHfGquHyeEJUI",
    authDomain: "geniusnotes-ai.firebaseapp.com",
    projectId: "geniusnotes-ai",
    storageBucket: "geniusnotes-ai.firebasestorage.app",
    messagingSenderId: "1041746856723",
    appId: "1:1041746856723:web:fae9072e0292c3946068e6",
    measurementId: "G-6MEN0RBSEF"
  });
  const auth = firebase.auth();

  auth.onAuthStateChanged(user => { if (user) window.location.href = 'dashboard.html'; });
  if (localStorage.getItem('theme') === 'light') document.documentElement.classList.add('light');

  const nameEl    = document.getElementById('name');
  const emailEl   = document.getElementById('email');
  const passEl    = document.getElementById('password');
  const errorMsg  = document.getElementById('errorMsg');
  const submitBtn = document.getElementById('submitBtn');
  const strengthBar = document.getElementById('strengthBar');

  function showError(msg) { errorMsg.textContent = msg; errorMsg.classList.add('show'); }
  function clearError() { errorMsg.classList.remove('show'); }

  document.getElementById('togglePw').addEventListener('click', () => {
    passEl.type = passEl.type === 'password' ? 'text' : 'password';
  });

  passEl.addEventListener('input', () => {
    const v = passEl.value;
    let score = 0;
    if (v.length >= 8) score++;
    if (/[A-Z]/.test(v)) score++;
    if (/[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;
    const colors = ['#EF4444', '#F59E0B', '#10B981', '#8B5CF6'];
    strengthBar.style.width = (score * 25) + '%';
    strengthBar.style.background = colors[score - 1] || 'transparent';
  });

  submitBtn.addEventListener('click', async () => {
    clearError();
    const name  = nameEl.value.trim();
    const email = emailEl.value.trim();
    const pass  = passEl.value;
    if (!name || !email || !pass) return showError('Please fill in all fields.');
    if (pass.length < 8) return showError('Password must be at least 8 characters.');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating account…';
    try {
      const { user } = await auth.createUserWithEmailAndPassword(email, pass);
      await user.updateProfile({ displayName: name });
      window.location.href = 'dashboard.html';
    } catch (e) {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Create account';
      const msgs = {
        'auth/email-already-in-use': 'An account with this email already exists.',
        'auth/invalid-email': 'Please enter a valid email.',
        'auth/weak-password': 'Password is too weak.'
      };
      showError(msgs[e.code] || e.message);
    }
  });

  document.getElementById('googleBtn').addEventListener('click', async () => {
    clearError();
    try {
      await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
      window.location.href = 'dashboard.html';
    } catch (e) {
      if (e.code !== 'auth/popup-closed-by-user') showError(e.message);
    }
  });

  [nameEl, emailEl, passEl].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') submitBtn.click(); }));
</script>
</body>
</html>
